name: Deploy to ECS

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPO_API: fintech-api
  ECR_REPO_WORKER: fintech-worker
  ECS_CLUSTER: fintech-cluster
  ECS_SERVICE_API: fintech-api-service
  ECS_SERVICE_WORKER: fintech-worker-service

jobs:
  deploy:
    name: Build → Push → Migrate → Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        id: build-api
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO_API }}:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Build and push Worker image
        id: build-worker
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO_WORKER }}:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Run Alembic migrations
        run: |
          # Run migrations via a one-off ECS task (uses the API image)
          # This runs BEFORE updating the services to avoid schema/code mismatch.
          aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition fintech-migrate \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.ECS_SUBNET_ID }}],securityGroups=[${{ secrets.ECS_SG_ID }}],assignPublicIp=ENABLED}" \
            --overrides '{"containerOverrides":[{"name":"migrate","command":["alembic","upgrade","head"]}]}' \
            --wait-until-stopped \
            --region ${{ env.AWS_REGION }}

      - name: Deploy API service (rolling update)
        run: |
          # Force new deployment with the new image SHA
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE_API }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE_API }} \
            --region ${{ env.AWS_REGION }}

      - name: Deploy Worker service (rolling update)
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE_WORKER }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE_WORKER }} \
            --region ${{ env.AWS_REGION }}
